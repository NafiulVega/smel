{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" name="viewport">
    <title>Login &mdash; SMEL</title>

    <!-- General CSS Files -->
    <link rel="stylesheet" href="{% static 'assets/modules/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/modules/fontawesome/css/all.min.css' %}">

    <!-- Template CSS -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'assets/css/components.css' %}">
</head>

<body>
    <div id="app">
        <section class="section">
            <div class="container mt-5">
                <div class="row">
                    <div class="col-12 col-sm-8 offset-sm-2 col-md-6 offset-md-3 col-lg-6 offset-lg-3 col-xl-4 offset-xl-4">
                        <div class="login-brand">
                            <i class="fas fa-lightbulb fa-3x text-warning"></i>
                            <h4 class="mt-2 mb-0">SMEL</h4>
                            <small class="text-muted">Smart Electricity Monitoring</small>
                        </div>

                        <div class="card card-primary">
                            <div class="card-header"><h4>Login</h4></div>

                            <div class="card-body">
                                {% if messages %}
                                {% for msg in messages %}
                                <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
                                    {{ msg }}
                                    <button type="button" class="close" data-dismiss="alert"><span>&times;</span></button>
                                </div>
                                {% endfor %}
                                {% endif %}

                                <form method="POST" action="{% url 'login' %}" class="needs-validation" novalidate>
                                    {% csrf_token %}
                                    <input type="hidden" name="next" value="{{ next }}">

                                    <div class="form-group">
                                        <label for="username">Username</label>
                                        <input id="username" type="text" class="form-control" name="username"
                                               tabindex="1" required autofocus placeholder="Masukkan username">
                                        <div class="invalid-feedback">
                                            Username wajib diisi
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <div class="d-block">
                                            <label for="password" class="control-label">Password</label>
                                        </div>
                                        <input id="password" type="password" class="form-control" name="password"
                                               tabindex="2" required placeholder="Masukkan password">
                                        <div class="invalid-feedback">
                                            Password wajib diisi
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <button type="submit" class="btn btn-primary btn-lg btn-block" tabindex="3">
                                            <i class="fas fa-sign-in-alt mr-1"></i> Login
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div class="simple-footer">
                            Copyright &copy; 2026 &mdash; SMEL
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- General JS Scripts -->
    <script src="{% static 'assets/modules/jquery.min.js' %}"></script>
    <script src="{% static 'assets/modules/popper/popper.js' %}"></script>
    <script src="{% static 'assets/modules/tooltip/tooltip.js' %}"></script>
    <script src="{% static 'assets/modules/bootstrap/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'assets/modules/nicescroll/jquery.nicescroll.min.js' %}"></script>
    <script src="{% static 'assets/modules/moment.min.js' %}"></script>
    <script src="{% static 'assets/js/stisla.js' %}"></script>

    <!-- Template JS File -->
    <script src="{% static 'assets/js/scripts.js' %}"></script>
    <script src="{% static 'assets/js/custom.js' %}"></script>
</body>
</html>
